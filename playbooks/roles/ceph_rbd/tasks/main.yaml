- name: Import images to Ceph
  shell: >
    rbd import {{ local_cloud_image }}
    {{ ceph_pool }}/{{ item.item.name }}-root
    --id {{ ceph_user }}
    --keyring /tmp/ceph.keyring
  loop: "{{ rbd_check.results }}"
  when: item.rc != 0
  throttle: 3

- name: Resize RBD
  shell: >
    rbd resize --size {{ disk_size }}
    {{ ceph_pool }}/{{ item.name }}-root
    --id {{ ceph_user }}
    --keyring /tmp/ceph.keyring
  loop: "{{ missing_rbd }}"
  throttle: 3
  register: resize_result
  failed_when:
    - resize_result.rc != 0
    - "'new size is equal to original size' not in resize_result.stderr"


