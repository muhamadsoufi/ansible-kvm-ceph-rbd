- name: Define Ceph Secret & Set Value
  shell: |
    echo "<secret ephemeral='no' private='no'>
      <uuid>{{ ceph_secret_uuid }}</uuid>
      <usage type='ceph'>
        <name>ceph-user-secret</name>
      </usage>
    </secret>" > /tmp/sec.xml

    virsh secret-list | grep ceph-user-secret || virsh secret-define /tmp/sec.xml
    virsh secret-set-value --secret {{ ceph_secret_uuid }} --base64 {{ ceph_secret_value }}

- name: Create Ceph keyring
  copy:
    dest: /tmp/ceph.keyring
    content: |
      [client.{{ ceph_user }}]
        key = {{ ceph_secret_value }}

- name: Check RBD existence
  shell: >
    rbd info {{ ceph_pool }}/{{ item.name }}-root
    --id {{ ceph_user }}
    --keyring /tmp/ceph.keyring
  loop: "{{ vms }}"
  register: rbd_check
  failed_when: false

- name: Set list of missing RBDs
  set_fact:
    missing_rbd: "{{ rbd_check.results | selectattr('rc','ne',0) | map(attribute='item') | list }}"

